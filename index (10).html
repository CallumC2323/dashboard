<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#080808">
<title>Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --bg1: #111111;
    --bg2: #181818;
    --bg3: #222222;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #F0EDE8;
    --text2: #888880;
    --text3: #555550;
    --gold: #C8A96E;
    --gold-dim: rgba(200,169,110,0.12);
    --green: #6BBF8E;
    --green-dim: rgba(107,191,142,0.12);
    --red: #E07070;
    --red-dim: rgba(224,112,112,0.1);
    --blue: #7EB8D4;
    --blue-dim: rgba(126,184,212,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(80px + var(--safe-bottom));
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: calc(20px + var(--safe-top)) 20px 16px;
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 22px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; }
  .header-session { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-family: 'DM Mono', monospace; }
  .session-gym { background: var(--gold-dim); color: var(--gold); }
  .session-run { background: var(--green-dim); color: var(--green); }
  .session-rest { background: var(--bg2); color: var(--text3); }
  .header-sync { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; cursor: pointer; padding: 4px 8px; border: 1px solid var(--border); border-radius: 99px; background: none; }
  .header-sync:active { opacity: 0.6; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 4px 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.03em;
    transition: color 0.15s;
  }
  .nav-item.active { color: var(--text); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-dot { width: 4px; height: 4px; border-radius: 99px; background: var(--gold); opacity: 0; transition: opacity 0.15s; }
  .nav-item.active .nav-dot { opacity: 1; }

  /* Page */
  .page { padding: 20px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards */
  .card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  /* Metric row */
  .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
  .metric-value span { font-size: 13px; color: var(--text2); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Progress bar */
  .prog-wrap { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; margin: 8px 0 4px; }
  .prog-bar { height: 100%; border-radius: 99px; background: var(--gold); transition: width 0.4s ease; }
  .prog-bar.green { background: var(--green); }
  .prog-label { font-size: 11px; color: var(--text3); display: flex; justify-content: space-between; }

  /* Exercise list */
  .ex-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .ex-item:last-child { border-bottom: none; }
  .ex-name { font-size: 14px; color: var(--text); }
  .ex-note { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .ex-sets { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); white-space: nowrap; }

  /* Set logger */
  .set-grid-header {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 1fr;
    gap: 6px;
    padding: 0 0 6px;
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
  .set-grid-header div:first-child { text-align: left; }
  .set-grid {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .set-num { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .set-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 6px;
    text-align: center;
    width: 100%;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .set-input:focus { outline: none; border-color: var(--border2); }
  .set-input.filled { border-color: var(--gold); color: var(--gold); }

  /* Inputs */
  .input-group { margin-bottom: 12px; }
  .input-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
  .input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .input:focus { outline: none; border-color: var(--border2); }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); opacity: 0.8; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; font-weight: 500; }
  .btn-gold { background: var(--gold-dim); color: var(--gold); border-color: rgba(200,169,110,0.2); }
  .btn-green { background: var(--green-dim); color: var(--green); border-color: rgba(107,191,142,0.2); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  /* History rows */
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .history-main { font-size: 14px; color: var(--text); }
  .history-sub { font-size: 12px; color: var(--text2); }
  .history-right { text-align: right; }

  /* Week strip */
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 12px; }
  .week-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 2px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
  }
  .week-day.today { background: var(--bg3); border: 1px solid var(--border2); }
  .week-day-label { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .week-day-dot { width: 6px; height: 6px; border-radius: 99px; background: var(--bg3); }
  .week-day-dot.gym { background: var(--gold); }
  .week-day-dot.run { background: var(--green); }
  .week-day-dot.rest { background: var(--bg3); }

  /* Section divider */
  .section-gap { margin-bottom: 20px; }
  .section-head { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-top: 4px; }

  /* Tabs within page */
  .inner-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
  .inner-tab { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .inner-tab.active { background: var(--text); color: var(--bg); border-color: transparent; }

  /* Tag */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .tag-gold { background: var(--gold-dim); color: var(--gold); }
  .tag-green { background: var(--green-dim); color: var(--green); }
  .tag-blue { background: var(--blue-dim); color: var(--blue); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(90px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* Sync status */
  .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .sync-dot { width: 6px; height: 6px; border-radius: 99px; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.pending { background: var(--gold); }
  .sync-dot.error { background: var(--red); }
</style>
</head>
<body>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px;">
    Loading...
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<script>
const GAPI_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
const DRIVE_FILE_NAME = 'dashboard_data.json';

const SCHEDULE = [
  { day: 'Sunday',    type: 'rest', session: 'Rest',    exercises: [], sets: [] },
  { day: 'Monday',    type: 'gym',  session: 'Upper A', exercises: ['Incline Barbell Press','Seated Cable Row','Seated DB Shoulder Press','Lat Pulldown','EZ Bar Curl','Overhead Tricep Extension'], sets: ['4×6–8','4×8–10','3×8–10','3×10–12','3×10–12','3×10–12'] },
  { day: 'Tuesday',   type: 'gym',  session: 'Lower A', exercises: ['Barbell Back Squat','Romanian Deadlift','Leg Press','Leg Curl','Standing Calf Raise'], sets: ['4×6–8','3×8–10','3×10–12','3×10–12','4×12–15'] },
  { day: 'Wednesday', type: 'run',  session: 'Run',     exercises: [], sets: [] },
  { day: 'Thursday',  type: 'gym',  session: 'Upper B', exercises: ['Incline DB Press','Cable Chest Fly','Chest-Supported DB Row','Face Pulls','DB Lateral Raise','Hammer Curl','Tricep Pushdown'], sets: ['4×10–12','3×12–15','4×10–12','3×15–20','4×12–15','3×10–12','3×12–15'] },
  { day: 'Friday',    type: 'gym',  session: 'Lower B', exercises: ['Leg Press','Bulgarian Split Squat','Lying Leg Curl','Hip Thrust','Seated Calf Raise'], sets: ['4×10–12','3×10–12','4×10–12','3×12–15','4×12–15'] },
  { day: 'Saturday',  type: 'run',  session: 'Run',     exercises: [], sets: [] },
];

const ABS = [
  { name: 'Hollow Body Hold', sets: '3×20–30s' },
  { name: 'Dead Bug', sets: '3×8–10 each' },
  { name: 'Hanging Knee Raise', sets: '3×12–15' },
  { name: 'Bicycle Crunch', sets: '3×15–20 each' },
  { name: 'Plank', sets: '3×30–45s' },
];

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function todaySched() {
  return SCHEDULE[new Date().getDay()];
}

let DB = {
  lifts: {},
  runs: [],
  calories: {},
  weight: [],
  absLog: [],
  lastSync: null,
};

let syncStatus = 'local';
let activeTab = 'today';
let activeExIdx = null;
let driveFileId = null;

function saveLocal() {
  try { localStorage.setItem('dashboard_db', JSON.stringify(DB)); } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('dashboard_db');
    if (raw) DB = { ...DB, ...JSON.parse(raw) };
  } catch(e) {}
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function syncToDrive() {
  showToast('Syncing to Drive…');
  try {
    const token = await getGoogleToken();
    if (!token) { showToast('Sign in to sync'); return; }
    const content = JSON.stringify(DB, null, 2);
    if (driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: content
      });
    } else {
      const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'&spaces=drive`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const searchData = await search.json();
      if (searchData.files && searchData.files.length > 0) {
        driveFileId = searchData.files[0].id;
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: content
        });
      } else {
        const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'application/json' })
        });
        const metaData = await meta.json();
        driveFileId = metaData.id;
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: content
        });
      }
    }
    DB.lastSync = new Date().toISOString();
    saveLocal();
    syncStatus = 'synced';
    showToast('Synced ✓');
    render();
  } catch(e) {
    showToast('Sync failed');
    console.error(e);
  }
}

async function loadFromDrive() {
  try {
    const token = await getGoogleToken();
    if (!token) return;
    const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}'&spaces=drive`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const searchData = await search.json();
    if (searchData.files && searchData.files.length > 0) {
      driveFileId = searchData.files[0].id;
      const file = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await file.json();
      DB = { ...DB, ...data };
      saveLocal();
      syncStatus = 'synced';
      showToast('Loaded from Drive ✓');
      render();
    }
  } catch(e) { console.error(e); }
}

let googleToken = null;
async function getGoogleToken() {
  if (googleToken) return googleToken;
  return new Promise((resolve) => {
    if (!window.google) { resolve(null); return; }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GAPI_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (resp) => {
        if (resp.access_token) { googleToken = resp.access_token; resolve(googleToken); }
        else resolve(null);
      }
    });
    client.requestAccessToken();
  });
}

function getTodayLifts() { return DB.lifts[todayStr()] || {}; }

function setLift(exIdx, setIdx, field, val) {
  if (!DB.lifts[todayStr()]) DB.lifts[todayStr()] = {};
  const k = `${exIdx}_${setIdx}`;
  if (!DB.lifts[todayStr()][k]) DB.lifts[todayStr()][k] = {};
  DB.lifts[todayStr()][k][field] = val;
  saveLocal();
  const el = document.querySelector(`[data-key="${k}-${field}"]`);
  if (el && val) el.classList.add('filled');
}

function addRun(date, duration, distance, notes) {
  DB.runs.unshift({ date, duration: parseFloat(duration)||0, distance: parseFloat(distance)||0, notes });
  saveLocal();
  showToast('Run saved');
  render();
}

function addFood(item, kcal, protein) {
  const d = todayStr();
  if (!DB.calories[d]) DB.calories[d] = [];
  DB.calories[d].push({ item, kcal: parseInt(kcal)||0, protein: parseInt(protein)||0 });
  saveLocal();
  showToast('Food logged');
  render();
}

function removeFood(idx) {
  const d = todayStr();
  if (DB.calories[d]) { DB.calories[d].splice(idx, 1); saveLocal(); render(); }
}

function addWeight(date, kg) {
  DB.weight.unshift({ date, kg: parseFloat(kg) });
  saveLocal();
  showToast('Weight logged');
  render();
}

function markAbsDone() {
  const d = todayStr();
  if (!DB.absLog.includes(d)) { DB.absLog.push(d); saveLocal(); showToast('Abs logged ✓'); render(); }
}

function weeklyStats() {
  const now = new Date();
  let vol = 0;
  Object.entries(DB.lifts).forEach(([k, sets]) => {
    if ((now - new Date(k+'T00:00:00')) / 86400000 <= 7) {
      Object.values(sets).forEach(s => { if (s.weight && s.reps) vol += parseFloat(s.weight) * parseInt(s.reps); });
    }
  });
  const runs = DB.runs.filter(r => (now - new Date(r.date+'T00:00:00')) / 86400000 <= 7).length;
  const abs = DB.absLog.filter(d => (now - new Date(d+'T00:00:00')) / 86400000 <= 7).length;
  return { vol: Math.round(vol), runs, abs };
}

function currentWeight() { return DB.weight.length ? DB.weight[0].kg : 80; }

function todayNutrition() {
  const items = DB.calories[todayStr()] || [];
  return {
    items,
    kcal: items.reduce((a,b) => a+(b.kcal||0), 0),
    protein: items.reduce((a,b) => a+(b.protein||0), 0),
  };
}

function weekStrip() {
  const today = new Date().getDay();
  return SCHEDULE.map((s, i) => ({
    label: s.day.slice(0,1),
    type: s.type,
    today: i === today,
    done: i < today ? DB.lifts[getDateForDay(i)] || (s.type === 'run' && DB.runs.some(r => r.date === getDateForDay(i))) : false,
  }));
}

function getDateForDay(dayIdx) {
  const now = new Date();
  const diff = dayIdx - now.getDay();
  const d = new Date(now);
  d.setDate(d.getDate() + diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderToday() {
  const sched = todaySched();

  const cw = currentWeight();

  const strip = weekStrip();

  const sessionClass = sched.type === 'gym' ? 'session-gym' : sched.type === 'run' ? 'session-run' : 'session-rest';
  const sessionLabel = sched.type === 'gym' ? `● ${sched.session}` : sched.type === 'run' ? `● Run Day` : `● Rest`;

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date">${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}</div>
        <div class="header-title">Good ${now.getHours() < 12 ? 'morning' : now.getHours() < 17 ? 'afternoon' : 'evening'}, Callum.</div>
      </div>
      <button class="header-sync" onclick="syncToDrive()">↑ Sync</button>
    </div>
    <div class="header-session ${sessionClass}">${sessionLabel}</div>
  </div>
  <div class="page">

    <div class="week-strip">
      ${strip.map(d => `
        <div class="week-day ${d.today ? 'today' : ''}">
          <div class="week-day-label">${d.label}</div>
          <div class="week-day-dot ${d.type}"></div>
        </div>
      `).join('')}
    </div>

    <div class="metric-row">
      <div class="metric">
        <div class="metric-label">Weight</div>
        <div class="metric-value">${cw}<span>kg</span></div>
        <div class="metric-sub">${Math.max(0,(90-cw).toFixed(1))}kg to target</div>
      </div>
      <div class="metric">
        <div class="metric-label">Weekly volume</div>
        <div class="metric-value">${stats.vol > 999 ? (stats.vol/1000).toFixed(1)+'k' : stats.vol}<span>kg</span></div>
        <div class="metric-sub">Load lifted</div>
      </div>
    </div>
    <div class="metric-row">
      <div class="metric">
        <div class="metric-label">Runs this week</div>
        <div class="metric-value">${stats.runs}<span>/2</span></div>
        <div class="metric-sub">Target: Wed + Sat</div>
      </div>
      <div class="metric">
        <div class="metric-label">Abs this week</div>
        <div class="metric-value">${stats.abs}<span>/3</span></div>
        <div class="metric-sub">Home circuit</div>
      </div>
    </div>`;

  if (sched.type === 'gym') {
    html += `
    <div class="card">
      <div class="card-title">Today's session — ${sched.session}</div>
      ${sched.exercises.map((ex, i) => `
        <div class="ex-item">
          <div class="ex-name">${ex}</div>
          <div class="ex-sets">${sched.sets[i]}</div>
        </div>
      `).join('')}
      <div style="margin-top:14px">
        <button class="btn btn-gold btn-sm" onclick="switchTab('lift')">Open session →</button>
      </div>
    </div>`;
  }

  if (sched.type === 'run') {
    html += `
    <div class="card">
      <div class="card-title">Run day</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:14px">20–25 min easy conversational pace. Consistency over speed.</div>
      <button class="btn btn-green btn-sm" onclick="switchTab('runs')">Log run →</button>
    </div>`;
  }

  if (sched.type === 'rest') {
    html += `
    <div class="card">
      <div class="card-title">Rest day</div>
      <div style="font-size:14px;color:var(--text2)">Full recovery. Consider your abs circuit if you haven't hit 3× this week (${stats.abs}/3).</div>
    </div>`;
  }

  const calPct = Math.min(100, Math.round(nutr.kcal / 3100 * 100));
  const protPct = Math.min(100, Math.round(nutr.protein / 170 * 100));
  html += `
    <div class="card">
      <div class="card-title">Nutrition today</div>
      <div style="display:flex;gap:20px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Calories</div>
          <div style="font-size:20px;font-weight:300">${nutr.kcal} <span style="font-size:12px;color:var(--text3)">/ 3,100</span></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Protein</div>
          <div style="font-size:20px;font-weight:300">${nutr.protein}g <span style="font-size:12px;color:var(--text3)">/ 170g</span></div>

function renderLift() {
  const sched = todaySched();
  const todayLifts = getTodayLifts();

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date">Lift log</div>
        <div class="header-title">${sched.session}</div>
      </div>
      <button class="header-sync" onclick="syncToDrive()">↑ Sync</button>
    </div>
  </div>
  <div class="page">`;

  if (sched.type !== 'gym') {
    html += `<div class="card"><div style="font-size:14px;color:var(--text2);margin-bottom:14px">Not a gym day — but you can still log here.</div>
    <div class="section-head">Log a different session</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${SCHEDULE.filter(s=>s.type==='gym').map(s => `<button class="btn btn-sm" onclick="overrideSched('${s.session}')">${s.session}</button>`).join('')}
    </div></div>`;
  }

  const exercises = activeExIdx !== null ? sched.exercises : sched.exercises;

  sched.exercises.forEach((ex, exIdx) => {
    const numSets = parseInt(sched.sets[exIdx].split('×')[0]) || 3;
    const isOpen = activeExIdx === exIdx;

    html += `
    <div class="card" style="${isOpen ? 'border-color:var(--border2)' : ''}">
      <div onclick="toggleEx(${exIdx})" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--text)">${ex}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${sched.sets[exIdx]}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">`;

    let filledSets = 0;
    for (let s = 0; s < numSets; s++) {
      const k = `${exIdx}_${s}`;
      if (todayLifts[k] && todayLifts[k].weight && todayLifts[k].reps) filledSets++;
    }
    if (filledSets > 0) {
      html += `<span class="tag tag-gold">${filledSets}/${numSets}</span>`;
    }
    html += `<span style="color:var(--text3);font-size:18px;transition:transform 0.2s;${isOpen?'transform:rotate(180deg)':''}">⌄</span>
        </div>
      </div>`;

    if (isOpen) {
      html += `
      <div style="margin-top:14px">
        <div class="set-grid-header">
          <div></div><div>KG</div><div>REPS</div><div>RPE</div>
        </div>`;
      for (let s = 0; s < numSets; s++) {
        const k = `${exIdx}_${s}`;
        const saved = todayLifts[k] || {};
        html += `
        <div class="set-grid">
          <div class="set-num">S${s+1}</div>
          <input class="set-input ${saved.weight?'filled':''}" type="number" inputmode="decimal" placeholder="—" value="${saved.weight||''}" data-key="${k}-weight" onchange="setLift(${exIdx},${s},'weight',this.value)" />
          <input class="set-input ${saved.reps?'filled':''}" type="number" inputmode="numeric" placeholder="—" value="${saved.reps||''}" data-key="${k}-reps" onchange="setLift(${exIdx},${s},'reps',this.value)" />
          <input class="set-input ${saved.rpe?'filled':''}" type="number" inputmode="numeric" placeholder="—" min="1" max="10" value="${saved.rpe||''}" data-key="${k}-rpe" onchange="setLift(${exIdx},${s},'rpe',this.value)" />
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  const recent = Object.entries(DB.lifts).sort((a,b)=>b[0].localeCompare(a[0])).slice(1,5);
  if (recent.length) {
    html += `<div class="section-head" style="margin-top:8px">Recent sessions</div>`;
    recent.forEach(([date, sets]) => {
      const vol = Object.values(sets).reduce((a,s) => a+(parseFloat(s.weight||0)*parseInt(s.reps||0)),0);
      const sched2 = SCHEDULE[new Date(date+'T00:00:00').getDay()];
      html += `<div class="card" style="padding:12px 16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:13px">${formatDate(date)} — ${sched2?.session||'Session'}</div></div>
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${Math.round(vol).toLocaleString()} kg</div>
        </div>
      </div>`;
    });
  }

  html += `</div>`;
  return html;
}

          <input class="input" type="text" id="run-notes" placeholder="Easy pace" />

    html += `
    <div class="metric-row-3">
      <div class="metric"><div class="metric-label">Total runs</div><div class="metric-value">${DB.runs.length}</div></div>
      <div class="metric"><div class="metric-label">Avg duration</div><div class="metric-value">${avgDur}<span>min</span></div></div>
      <div class="metric"><div class="metric-label">Total distance</div><div class="metric-value">${totalDist}<span>km</span></div></div>
    </div>
    <div class="section-head">History</div>`;
    DB.runs.slice(0,15).forEach(r => {
      html += `<div class="card" style="padding:12px 16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px">${formatDate(r.date)}</div>
            ${r.notes ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${r.notes}</div>` : ''}
          </div>
          <div style="text-align:right;font-family:'DM Mono',monospace">
            <div style="font-size:13px">${r.duration} min</div>
            ${r.distance ? `<div style="font-size:11px;color:var(--text3)">${r.distance} km</div>` : ''}
          </div>
        </div>
      </div>`;
    });
  } else {
    html += `<div class="empty">No runs yet.<br>First one on Wednesday.</div>`;
  }

  html += `</div>`;
  return html;
}

  const calPct = Math.min(100, Math.round(nutr.kcal/3100*100));
  const protPct = Math.min(100, Math.round(nutr.protein/170*100));

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date">Nutrition</div>
        <div class="header-title">${nutr.kcal} kcal today</div>
      </div>
      <button class="header-sync" onclick="syncToDrive()">↑ Sync</button>
    </div>
  </div>
  <div class="page">
    <div class="metric-row">
      <div class="metric">
        <div class="metric-label">Calories</div>
        <div class="metric-value">${nutr.kcal}<span>/ 3,100</span></div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${calPct}%"></div></div>
        <div class="metric-sub">${calPct}% of target</div>
      </div>
      <div class="metric">
        <div class="metric-label">Protein</div>

    <div class="card">
      <div class="card-title">Add food</div>

      </div>
      <div class="input-row">
        <div class="input-group" style="margin:0">
          <label class="input-label">Calories</label>
          <input class="input" type="number" inputmode="numeric" id="food-kcal" placeholder="550" />
        </div>
        <div class="input-group" style="margin:0">
          <label class="input-label">Protein (g)</label>

      <div style="margin-top:12px"><button class="btn btn-primary btn-full" onclick="submitFood()">Add food</button></div>

  if (nutr.items.length) {
    html += `<div class="section-head">Today's log</div><div class="card">`;
    nutr.items.forEach((item, i) => {
      html += `<div class="history-item">
        <div>
          <div class="history-main">${item.item}</div>
          <div class="history-sub">${item.protein}g protein</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-family:'DM Mono',monospace;font-size:13px">${item.kcal} kcal</div>
          <button onclick="removeFood(${i})" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:2px">×</button>

  }

  const cw = currentWeight();
  const stats = weeklyStats();

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date">Progress</div>
        <div class="header-title">${cw}kg</div>
      </div>
      <button class="header-sync" onclick="syncToDrive()">↑ Sync</button>
    </div>
  </div>
  <div class="page">
    <div class="card">
      <div class="card-title">Log weight</div>
      <div class="input-row" style="margin-bottom:12px">
        <div class="input-group" style="margin:0">
          <label class="input-label">Date</label>
          <input class="input" type="date" id="w-date" value="${todayStr()}" />

        <div class="input-group" style="margin:0">

    <div class="metric-row">

        <div class="metric-label">Current</div>

        <div class="metric-sub">Started: 80kg</div>
      </div>
      <div class="metric">
        <div class="metric-label">To target</div>
        <div class="metric-value">${Math.max(0,(90-cw).toFixed(1))}<span>kg</span></div>
        <div class="metric-sub">Target: 90kg</div>
      </div>
    </div>

    <div style="margin-bottom:12px">
      <div class="prog-wrap" style="height:5px"><div class="prog-bar" style="width:${Math.min(100,Math.round(((cw-80)/10)*100))}%"></div></div>
      <div class="prog-label"><span>80kg</span><span>90kg</span></div>
    </div>

    <div class="metric-row">
      <div class="metric">
        <div class="metric-label">Total sessions</div>
        <div class="metric-value">${Object.keys(DB.lifts).length}</div>
        <div class="metric-sub">Logged</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total runs</div>
        <div class="metric-value">${DB.runs.length}</div>
        <div class="metric-sub">Logged</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Abs circuit</div>
      ${ABS.map(ex => `
        <div class="ex-item"><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets}</div></div>
      `).join('')}
      <div style="margin-top:12px">
        ${DB.absLog.includes(todayStr())
          ? `<span style="font-size:13px;color:var(--green)">✓ Done today</span>`
          : `<button class="btn btn-green btn-sm" onclick="markAbsDone()">Mark done today</button>`

        <div class="history-main">${formatDate(w.date)}</div>

function render() {
  const app = document.getElementById('app');
  if (activeTab === 'today') app.innerHTML = renderToday();
  else if (activeTab === 'lift') app.innerHTML = renderLift();
  else if (activeTab === 'runs') app.innerHTML = renderRuns();
  else if (activeTab === 'nutrition') app.innerHTML = renderNutrition();
  else if (activeTab === 'progress') app.innerHTML = renderProgress();
  renderNav();
}

window.switchTab = (tab) => { activeTab = tab; activeExIdx = null; render(); window.scrollTo(0,0); };
window.toggleEx = (idx) => { activeExIdx = activeExIdx === idx ? null : idx; render(); setTimeout(() => { document.querySelectorAll('.card')[idx+1]?.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 50); };
window.setLift = setLift;
window.syncToDrive = syncToDrive;
window.markAbsDone = markAbsDone;
window.removeFood = removeFood;

window.submitRun = () => {
  const date = document.getElementById('run-date').value;
  const dur = document.getElementById('run-dur').value;
  const dist = document.getElementById('run-dist').value;
  const notes = document.getElementById('run-notes').value;
  if (!dur) { showToast('Enter duration'); return; }
  addRun(date, dur, dist, notes);
};

window.submitFood = () => {
  const item = document.getElementById('food-item').value.trim();
  const kcal = document.getElementById('food-kcal').value;
  const protein = document.getElementById('food-protein').value;
  if (!item || !kcal) { showToast('Enter food and calories'); return; }
  addFood(item, kcal, protein);
};

window.submitWeight = () => {
  const date = document.getElementById('w-date').value;
  const kg = document.getElementById('w-kg').value;
  if (!kg) { showToast('Enter weight'); return; }
  addWeight(date, kg);
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

loadLocal();
render();
</script>
</body>
</html>
